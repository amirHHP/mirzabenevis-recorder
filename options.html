<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تنظیمات میرزابنویس</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --bg-color: #f8fafc;
      --panel-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --success-color: #10b981;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: 'Vazirmatn', system-ui, sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      background: var(--panel-bg);
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 600px;
      padding: 32px;
    }

    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: var(--primary-color);
    }

    p.desc {
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: monospace;
      font-size: 1rem;
      direction: ltr;
    }

    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    button.save-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.2s;
    }

    button.save-btn:hover {
      background-color: var(--primary-hover);
    }

    button.perm-btn {
      background-color: var(--success-color);
      color: white;
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 24px;
      width: 100%;
    }

    button.perm-btn:hover {
      opacity: 0.9;
    }

    .status {
      margin-top: 16px;
      font-weight: 600;
      color: var(--success-color);
      display: none;
    }
    
    .status.show {
      display: block;
    }
    
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      background-color: white;
    }
    
    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>تنظیمات میرزابنویس</h1>
    <p class="desc">برای تبدیل خودکار و دقیق صدای جلسات به متن، لطفاً کلید API مربوط به یکی از سرویس‌دهنده‌ها را وارد کنید. در صورت وارد نکردن کلید، فایل صوتی جلسه پس از پایان برای شما دانلود خواهد شد.</p>
    
    <button id="micPermBtn" class="perm-btn">اعطای دسترسی میکروفون</button>
    <div id="micStatusMsg" class="status" style="margin-bottom: 20px; margin-top: -10px;"></div>

    <div class="form-group">
      <label for="provider">انتخاب سرویس‌دهنده (Provider)</label>
      <select id="provider">
        <option value="openai">OpenAI (Whisper)</option>
        <option value="gemini">Google Gemini</option>
      </select>
    </div>

    <div class="form-group" id="openaiGroup">
      <label for="openaiKey">OpenAI API Key</label>
      <input type="password" id="openaiKey" placeholder="sk-..." autocomplete="off">
    </div>

    <div class="form-group hidden" id="geminiGroup">
      <label for="geminiKey">Gemini API Key</label>
      <input type="password" id="geminiKey" placeholder="AIza..." autocomplete="off">
    </div>
    
    <button id="saveBtn" class="save-btn">ذخیره تنظیمات</button>
    <div id="statusMsg" class="status">تنظیمات با موفقیت ذخیره شد!</div>
  </div>

  <script src="options.js"></script>
</body>
</html>
